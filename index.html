<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>럭키 드로우 - 선물 추첨기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --primary-pink: #f43f5e;
            --secondary-pink: #fb7185;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            width: 100vw;
            color: #334155;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-y: auto; /* 전체 페이지 스크롤 허용 */
        }

        /* 배경 장식 */
        .bg-deco {
            position: fixed; /* 배경 아이콘은 고정 */
            z-index: 0;
            opacity: 0.12;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }

        /* 메인 컨테이너 */
        .app-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 상단 카드: 추첨 제어 */
        .top-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid #ffffff;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.1);
            margin-bottom: 2rem;
        }

        /* 반응형 폰트 크기 조절 */
        .main-title {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 900;
        }

        .number-display {
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #f43f5e, #be185d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(190, 24, 93, 0.2));
        }

        /* 하단 카드: 당첨자 명단 */
        .bottom-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #ffffff;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.05);
            padding-bottom: 2rem;
        }

        .history-list {
            padding: 1rem;
        }

        .winner-item {
            background: #ffffff;
            border-left: 6px solid var(--primary-pink);
            margin-bottom: 0.75rem;
            padding: 1.2rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-draw {
            background: linear-gradient(135deg, #f43f5e 0%, #be185d 100%);
            color: white;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);
            transition: all 0.2s;
            width: 100%;
        }

        .btn-draw:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
        .btn-draw:active { transform: scale(0.98); }

        .modal-overlay {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
        }

        .prize-image-box {
            width: clamp(250px, 70vw, 350px);
            aspect-ratio: 1;
            border-radius: 2rem;
            border: 8px solid #fff1f2;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(190, 24, 93, 0.2);
        }

        .confetti {
            position: fixed; width: 10px; height: 10px; z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 배경 선물 상자 아이콘 -->
    <svg class="bg-deco" style="top:5%; left:5%; width:100px;" viewBox="0 0 24 24" fill="#f43f5e"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.1 0-1.99.9-1.99 2L2 19c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.41 12.25 12 8.66l3.59 3.59L17 10.83 14.92 8H20v6z"/></svg>
    <svg class="bg-deco" style="bottom:10%; right:10%; width:150px;" viewBox="0 0 24 24" fill="#fecdd3"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.1 0-1.99.9-1.99 2L2 19c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.41 12.25 12 8.66l3.59 3.59L17 10.83 14.92 8H20v6z"/></svg>

    <div class="app-wrapper">
        <!-- 상단: 추첨 영역 -->
        <div class="top-card">
            <h1 class="main-title text-rose-600 mb-6 flex items-center justify-center gap-2 text-center">
                <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.1 0-1.99.9-1.99 2L2 19c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.41 12.25 12 8.66l3.59 3.59L17 10.83 14.92 8H20v6z"/></svg>
                럭키 선물 추첨기
            </h1>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-[11px] font-black text-rose-400 mb-1 ml-1 uppercase">시작 번호</label>
                    <input type="number" id="startNum" value="1" class="w-full bg-rose-50 border-2 border-rose-100 rounded-xl py-3 px-4 font-black text-rose-700 outline-none focus:border-rose-400 transition-all">
                </div>
                <div>
                    <label class="block text-[11px] font-black text-rose-400 mb-1 ml-1 uppercase">끝 번호</label>
                    <input type="number" id="endNum" value="100" class="w-full bg-rose-50 border-2 border-rose-100 rounded-xl py-3 px-4 font-black text-rose-700 outline-none focus:border-rose-400 transition-all">
                </div>
            </div>

            <div class="text-center py-6 bg-white/60 rounded-[2rem] border-2 border-dashed border-rose-200 mb-6">
                <div id="displayNumber" class="number-display">0</div>
                <p id="statusText" class="text-rose-300 text-xs font-black uppercase tracking-[0.25em] mt-3">Ready to Start</p>
            </div>

            <button id="drawBtn" class="btn-draw">선물 상자 열기!</button>
        </div>

        <!-- 하단: 당첨 명단 영역 (페이지 스크롤에 따라 확장됨) -->
        <div class="bottom-card">
            <div class="px-6 py-6 border-b border-rose-50 flex justify-between items-center bg-rose-50/30 rounded-t-[2rem]">
                <h2 class="text-lg font-black text-rose-600 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
                    당첨자 명단
                </h2>
                <span id="winnerBadge" class="bg-rose-600 text-white text-xs font-black px-3 py-1 rounded-full">0명 당첨</span>
            </div>
            
            <div id="historyList" class="history-list">
                <div id="emptyMsg" class="py-12 flex flex-col items-center justify-center opacity-30 text-rose-400">
                    <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 15.5a5 5 0 11-10 0 5 5 0 0110 0zM7 7l.01 0M7 11l.01 0M7 15l.01 0M11 7l.01 0M11 11l.01 0M11 15l.01 0"/></svg>
                    <p class="text-lg font-black">아직 당첨자가 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 당첨 모달 -->
    <div id="winnerModal" class="fixed inset-0 z-[500] flex items-center justify-center hidden modal-overlay p-6">
        <div class="text-center w-full max-w-md">
            <h3 class="text-4xl md:text-5xl font-black text-rose-600 mb-2 italic">CONGRATS!</h3>
            <p class="text-rose-400 font-bold mb-8">오늘의 행운의 주인공</p>
            
            <div id="modalNumber" class="text-[9rem] md:text-[11rem] font-black text-rose-600 leading-none mb-10 drop-shadow-2xl">0</div>
            
            <div id="prizeImgArea" class="flex justify-center mb-10 hidden">
                <div class="prize-image-box">
                    <img id="prizeImage" src="" alt="Present" class="w-full h-full object-cover">
                </div>
            </div>

            <button id="closeModal" class="btn-draw">확인하고 명단에 기록</button>
        </div>
    </div>

    <script>
        const apiKey = "";
        const startNumInput = document.getElementById('startNum');
        const endNumInput = document.getElementById('endNum');
        const drawBtn = document.getElementById('drawBtn');
        const displayNumber = document.getElementById('displayNumber');
        const statusText = document.getElementById('statusText');
        const winnerModal = document.getElementById('winnerModal');
        const modalNumber = document.getElementById('modalNumber');
        const closeModal = document.getElementById('closeModal');
        const historyList = document.getElementById('historyList');
        const emptyMsg = document.getElementById('emptyMsg');
        const winnerBadge = document.getElementById('winnerBadge');
        const prizeImgArea = document.getElementById('prizeImgArea');
        const prizeImage = document.getElementById('prizeImage');

        let winners = [];
        let isDrawing = false;

        async function generateWinnerImage() {
            prizeImgArea.classList.add('hidden');
            const prompt = "A premium luxury gift box with shiny red ribbons, golden sparkles in the air, high-end celebratory studio lighting, 8k resolution, photorealistic";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: { prompt: prompt },
                        parameters: { sampleCount: 1 }
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    const b64 = result.predictions[0].bytesBase64Encoded;
                    prizeImage.src = `data:image/png;base64,${b64}`;
                    prizeImgArea.classList.remove('hidden');
                }
            } catch (e) {
                console.error("AI Image failed to load");
            }
        }

        function triggerConfetti() {
            const colors = ['#f43f5e', '#fb7185', '#be185d', '#ffffff', '#fbbf24'];
            for (let i = 0; i < 150; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.width = (Math.random() * 8 + 4) + 'px';
                conf.style.height = (Math.random() * 10 + 4) + 'px';
                conf.style.animation = `fall ${Math.random() * 2 + 1.5}s linear forwards`;
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        function addWinnerToList(num) {
            if (emptyMsg) emptyMsg.style.display = 'none';
            
            const item = document.createElement('div');
            item.className = "winner-item";
            item.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-rose-100 rounded-full flex items-center justify-center text-rose-600 font-black text-xl">
                        ${winners.length}
                    </div>
                    <div class="font-black text-rose-800 text-2xl">${num}번 주인공</div>
                </div>
                <svg class="w-8 h-8 text-rose-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            `;
            
            historyList.prepend(item);
            winnerBadge.innerText = `${winners.length}명 당첨`;
        }

        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;

            const start = parseInt(startNumInput.value);
            const end = parseInt(endNumInput.value);
            const range = end - start + 1;

            if (isNaN(start) || isNaN(end) || start >= end) {
                alert("시작 번호와 끝 번호를 정확히 입력해주세요.");
                return;
            }

            if (winners.length >= range) {
                alert("모든 번호가 이미 당첨되었습니다!");
                return;
            }

            isDrawing = true;
            drawBtn.disabled = true;
            statusText.innerText = "SHUFFLING GIFTS...";
            
            let duration = 2500;
            let startAt = Date.now();
            
            const timer = setInterval(() => {
                const elapsed = Date.now() - startAt;
                const random = Math.floor(Math.random() * (end - start + 1)) + start;
                displayNumber.innerText = random;

                if (elapsed >= duration) {
                    clearInterval(timer);
                    
                    let final;
                    do {
                        final = Math.floor(Math.random() * (end - start + 1)) + start;
                    } while (winners.includes(final));

                    winners.push(final);
                    displayNumber.innerText = final;
                    modalNumber.innerText = final;
                    
                    setTimeout(() => {
                        winnerModal.classList.remove('hidden');
                        triggerConfetti();
                        generateWinnerImage();
                        isDrawing = false;
                        drawBtn.disabled = false;
                        statusText.innerText = "OPENED!";
                    }, 300);
                }
            }, 60);
        });

        closeModal.addEventListener('click', () => {
            winnerModal.classList.add('hidden');
            addWinnerToList(winners[winners.length - 1]);
            
            // 명단이 추가된 후 해당 위치로 부드럽게 스크롤 (사용자 경험 향상)
            setTimeout(() => {
                const historyTop = document.querySelector('.bottom-card').offsetTop;
                window.scrollTo({ top: historyTop - 20, behavior: 'smooth' });
            }, 100);
        });

        const s = document.createElement('style');
        s.innerHTML = `@keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }`;
        document.head.appendChild(s);
    </script>
</body>
</html>
